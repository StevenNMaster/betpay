<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetPay - Demo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo">
                <h1>⚽ BetPay <span>DEMO | Sin dinero real</span></h1>
            </div>
            <div class="header-right">
                <div class="saldo-card">
                    <div>💰 SALDO DEMO</div>
                    <div class="saldo-monto" id="saldoDisplay">$0</div>
                </div>
                <button class="btn-recarga" id="btnRecargaGeneral">+50.000</button>
            </div>
        </div>

        <div class="login-section" id="loginSection">
            <div class="login-form" id="loginFormContainer">
                <input type="text" id="loginUser" placeholder="Usuario" value="fanatico">
                <input type="password" id="loginPass" placeholder="Contraseña" value="123">
                <button class="btn-login" id="btnLogin">Ingresar</button>
            </div>
            <div id="loginUserInfo" style="display: none;">
                <div class="user-info-container">
                    <div class="user-info" id="currentUserSpan"></div>
                    <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
                </div>
            </div>
        </div>

        <div id="mainApp" style="display: none;">
            <div class="tabs">
                <button class="tab-btn active" data-tab="deportes">⚽ Apuestas Deportivas</button>
                <button class="tab-btn" data-tab="loterias">🎰 Loterías</button>
                <button class="tab-btn" data-tab="historial">📋 Mis Apuestas</button>
            </div>

            <div class="two-columns">
                <div class="sidebar">
                    <h3>🏆 POPULAR</h3>
                    <ul class="sidebar-menu" id="ligasSidebar"></ul>
                    <h3 style="margin-top: 20px;">📌 DEPORTES</h3>
                    <ul class="sidebar-menu" id="deportesSidebar"></ul>
                </div>

                <div class="content">
                    <div id="tabDeportes">
                        <h3 style="color:#FFD966">📅 Partidos destacados</h3>
                        <div id="partidosList"></div>
                    </div>
                    <div id="tabLoterias" style="display: none;">
                        <h3 style="color:#FFD966">🎲 Loterías BetPay</h3>
                        <div id="loteriasContainer"></div>
                    </div>
                    <div id="tabHistorial" style="display: none;">
                        <h3 style="color:#FFD966">📜 Historial de apuestas</h3>
                        <div id="historialLista" class="historial"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-aviso">
            ⚠️ BETPAY DEMO - Sin dinero real - Solo entretenimiento
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user.js"></script>
    <script src="js/sports.js"></script>
    <script src="js/lottery.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

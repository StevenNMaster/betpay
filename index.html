<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetPay - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a2f1f 0%, #051f12 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-box {
            background: rgba(11, 30, 21, 0.95);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #FFD966;
            text-align: center;
        }
        h1 {
            color: #FFD966;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .demo-badge {
            color: white;
            font-size: 0.8rem;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 60px;
            border: none;
            background: #0d2a1f;
            color: white;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            margin: 20px 0;
            border-radius: 60px;
            border: none;
            background: linear-gradient(135deg, #FFD966, #ffc107);
            color: #1a2a1f;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        .error {
            color: #ff8888;
            margin-top: 10px;
        }
        .saldo {
            background: #1a3a2a;
            padding: 15px;
            border-radius: 20px;
            margin-top: 20px;
            color: #FFD966;
        }
        .user-info {
            background: #1a3a2a;
            padding: 15px;
            border-radius: 20px;
            margin: 10px 0;
        }
        .hidden {
            display: none;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #6c8f7c;
        }
    </style>
</head>
<body>
    <div class="login-box" id="app">
        <h1>⚽ BetPay</h1>
        <div class="demo-badge">DEMO | Sin dinero real</div>

        <!-- Pantalla de Login -->
        <div id="loginPanel">
            <input type="text" id="username" placeholder="Usuario" value="fanatico">
            <input type="password" id="password" placeholder="Contraseña" value="123">
            <button onclick="iniciarSesion()">Ingresar</button>
            <div class="footer">⚠️ Solo entretenimiento - Sin dinero real</div>
        </div>

        <!-- Pantalla Principal (oculta al inicio) -->
        <div id="mainPanel" class="hidden">
            <div id="userInfo" class="user-info"></div>
            <div class="saldo">
                <div>💰 SALDO DEMO</div>
                <div style="font-size: 2rem;" id="saldoDisplay">$0</div>
                <button onclick="recargarSaldo()" style="margin-top: 10px; background: #1e7b4b;">+50.000</button>
            </div>
            <button onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </div>

    <script>
        // DATOS
        let usuarios = [];
        let usuarioActual = null;

        function cargarUsuarios() {
            const guardados = localStorage.getItem('betpay_usuarios');
            if (guardados) {
                usuarios = JSON.parse(guardados);
            } else {
                usuarios = [
                    { username: 'fanatico', password: '123', saldo: 100000, historial: [] },
                    { username: 'prueba', password: '123', saldo: 100000, historial: [] }
                ];
                localStorage.setItem('betpay_usuarios', JSON.stringify(usuarios));
            }
        }

        function guardarUsuarios() {
            localStorage.setItem('betpay_usuarios', JSON.stringify(usuarios));
        }

        function iniciarSesion() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            
            let usuario = usuarios.find(u => u.username === user && u.password === pass);
            
            if (!usuario) {
                usuario = { username: user, password: pass, saldo: 100000, historial: [] };
                usuarios.push(usuario);
                guardarUsuarios();
            }
            
            usuarioActual = usuario;
            mostrarMainPanel();
        }

        function mostrarMainPanel() {
            document.getElementById('loginPanel').classList.add('hidden');
            document.getElementById('mainPanel').classList.remove('hidden');
            
            document.getElementById('userInfo').innerHTML = `👤 ${usuarioActual.username}`;
            document.getElementById('saldoDisplay').innerText = `$${usuarioActual.saldo.toLocaleString()}`;
        }

        function cerrarSesion() {
            usuarioActual = null;
            document.getElementById('loginPanel').classList.remove('hidden');
            document.getElementById('mainPanel').classList.add('hidden');
        }

        function recargarSaldo() {
            if (!usuarioActual) return;
            usuarioActual.saldo += 50000;
            guardarUsuarios();
            document.getElementById('saldoDisplay').innerText = `$${usuarioActual.saldo.toLocaleString()}`;
            alert(`💰 Recarga exitosa! Nuevo saldo: $${usuarioActual.saldo.toLocaleString()}`);
        }

        function actualizarSaldo(monto, restar) {
            if (!usuarioActual) return false;
            if (restar) {
                if (usuarioActual.saldo < monto) return false;
                usuarioActual.saldo -= monto;
            } else {
                usuarioActual.saldo += monto;
            }
            guardarUsuarios();
            document.getElementById('saldoDisplay').innerText = `$${usuarioActual.saldo.toLocaleString()}`;
            return true;
        }

        cargarUsuarios();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetPay - Apuestas Deportivas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a2f1f 0%, #051f12 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .navbar {
            background: rgba(11, 30, 21, 0.95);
            border-radius: 28px;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            border: 1px solid #FFD966;
        }
        .logo h1 {
            color: #FFD966;
            font-size: 2rem;
        }
        .logo span {
            color: white;
            font-size: 0.7rem;
            display: block;
        }
        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .saldo-card {
            background: #1a3a2a;
            padding: 10px 28px;
            border-radius: 60px;
            text-align: center;
            border: 1px solid #FFD966;
        }
        .saldo-monto {
            font-size: 1.8rem;
            font-weight: bold;
            color: #FFD966;
        }
        .btn-recarga {
            background: #1e7b4b;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
        }
        .login-section {
            background: rgba(11, 30, 21, 0.9);
            border-radius: 32px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        .login-form {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .login-form input {
            padding: 14px 20px;
            border-radius: 60px;
            border: none;
            background: #0d2a1f;
            color: white;
            font-size: 1rem;
            width: 200px;
        }
        .btn-login {
            background: #FFD966;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            color: #1a2a1f;
        }
        .btn-logout {
            background: #8b3a3a;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        .user-info {
            background: #1a3a2a;
            padding: 12px 28px;
            border-radius: 60px;
            color: #FFD966;
            font-weight: bold;
            display: inline-block;
            margin-right: 15px;
        }
        .user-info-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: rgba(11, 30, 21, 0.8);
            border: 1px solid #FFD966;
            padding: 14px 32px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .tab-btn.active {
            background: #FFD966;
            color: #1a2a1f;
        }
        .two-columns {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        .sidebar {
            flex: 1;
            min-width: 260px;
            background: rgba(11, 30, 21, 0.9);
            border-radius: 28px;
            padding: 20px;
        }
        .sidebar h3 {
            color: #FFD966;
            margin-bottom: 15px;
        }
        .sidebar-menu {
            list-style: none;
        }
        .sidebar-menu li {
            padding: 12px 14px;
            color: #ddd;
            border-bottom: 1px solid rgba(255, 217, 102, 0.2);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .sidebar-menu li:hover {
            background: rgba(255, 217, 102, 0.2);
        }
        .menu-count {
            color: #FFD966;
        }
        .content {
            flex: 3;
            background: rgba(11, 30, 21, 0.9);
            border-radius: 28px;
            padding: 25px;
        }
        .content h3 {
            color: #FFD966;
            margin: 20px 0 15px 0;
        }
        .partido-card {
            background: #15281f;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #FFD966;
        }
        .equipos {
            font-size: 1rem;
            font-weight: bold;
            color: white;
        }
        .cuotas {
            display: flex;
            gap: 12px;
        }
        .cuota {
            background: #0d2a1f;
            padding: 10px 18px;
            border-radius: 50px;
            color: #FFD966;
            cursor: pointer;
            text-align: center;
            min-width: 85px;
            border: 1px solid #FFD966;
        }
        .cuota:hover {
            background: #FFD966;
            color: #1a2a1f;
        }
        .cuota small {
            display: block;
            font-size: 0.7rem;
        }
        .loteria-card {
            background: #15281f;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #FFD966;
        }
        .loteria-card h3 {
            color: #FFD966;
            font-size: 2rem;
        }
        .loteria-card input {
            padding: 12px;
            border-radius: 60px;
            border: none;
            background: #0d2a1f;
            color: white;
            margin: 10px;
            width: 150px;
        }
        .historial {
            margin-top: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        .historial-item {
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 16px;
            margin: 8px 0;
            border-left: 4px solid #FFD966;
        }
        .footer-aviso {
            text-align: center;
            margin-top: 30px;
            color: #6c8f7c;
            font-size: 0.7rem;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <div class="logo">
            <h1>⚽ BetPay <span>DEMO | Sin dinero real</span></h1>
        </div>
        <div class="header-right">
            <div class="saldo-card">
                <div>💰 SALDO DEMO</div>
                <div class="saldo-monto" id="saldoDisplay">$0</div>
            </div>
            <button class="btn-recarga" id="btnRecarga">+50.000</button>
        </div>
    </div>

    <div class="login-section" id="loginPanel">
        <div class="login-form" id="loginForm">
            <input type="text" id="username" placeholder="Usuario" value="fanatico">
            <input type="password" id="password" placeholder="Contraseña" value="123">
            <button class="btn-login" id="btnLogin">Ingresar</button>
        </div>
        <div id="userPanel" class="hidden">
            <div class="user-info-container">
                <div class="user-info" id="userName"></div>
                <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <div class="tabs">
            <button class="tab-btn active" data-tab="deportes">⚽ Apuestas Deportivas</button>
            <button class="tab-btn" data-tab="loterias">🎰 Loterías</button>
            <button class="tab-btn" data-tab="historial">📋 Mis Apuestas</button>
        </div>

        <div class="two-columns">
            <div class="sidebar">
                <h3>🏆 POPULAR</h3>
                <ul class="sidebar-menu" id="ligasList"></ul>
                <h3>📌 DEPORTES</h3>
                <ul class="sidebar-menu">
                    <li><span>⚽ Fútbol</span><span class="menu-count">120,057</span></li>
                    <li><span>🏀 Baloncesto</span><span class="menu-count">2,831</span></li>
                </ul>
            </div>

            <div class="content">
                <div id="deportesPanel">
                    <h3>📅 Partidos destacados</h3>
                    <div id="partidosList"></div>
                </div>
                <div id="loteriasPanel" class="hidden">
                    <h3>🎲 Loterías BetPay</h3>
                    <div id="loteriasList"></div>
                </div>
                <div id="historialPanel" class="hidden">
                    <h3>📜 Historial de apuestas</h3>
                    <div id="historialList" class="historial"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-aviso">
        ⚠️ BETPAY DEMO - Sin dinero real - Solo entretenimiento
    </div>
</div>

<script>
    // DATOS
    const ligas = [
        { nombre: "Premier League", count: 7963 },
        { nombre: "La Liga", count: 8399 },
        { nombre: "Serie A", count: 4432 },
        { nombre: "Liga BetPlay Dimayor", count: 504 }
    ];

    const partidos = {
        "Premier League": [
            { local: "Manchester City", visitante: "Arsenal", cuotaL: 2.10, cuotaE: 3.40, cuotaV: 3.20 },
            { local: "Liverpool", visitante: "Chelsea", cuotaL: 1.85, cuotaE: 3.60, cuotaV: 4.00 }
        ],
        "La Liga": [
            { local: "Real Madrid", visitante: "Barcelona", cuotaL: 2.20, cuotaE: 3.30, cuotaV: 3.10 }
        ],
        "Liga BetPlay Dimayor": [
            { local: "Atlético Nacional", visitante: "Millonarios", cuotaL: 2.00, cuotaE: 3.10, cuotaV: 3.80 }
        ]
    };

    // USUARIOS
    let usuarios = [];
    let usuarioActual = null;

    function cargarUsuarios() {
        let data = localStorage.getItem('betpay_users');
        if (data) {
            usuarios = JSON.parse(data);
        } else {
            usuarios = [{ username: 'fanatico', password: '123', saldo: 100000, historial: [] }];
            localStorage.setItem('betpay_users', JSON.stringify(usuarios));
        }
    }

    function guardarUsuarios() {
        localStorage.setItem('betpay_users', JSON.stringify(usuarios));
    }

    function login(user, pass) {
        let usuario = usuarios.find(u => u.username === user && u.password === pass);
        if (!usuario) {
            usuario = { username: user, password: pass, saldo: 100000, historial: [] };
            usuarios.push(usuario);
            guardarUsuarios();
        }
        usuarioActual = usuario;
        return true;
    }

    function actualizarUI() {
        document.getElementById('saldoDisplay').innerText = "$" + (usuarioActual?.saldo || 0).toLocaleString();
        if (usuarioActual) {
            document.getElementById('userName').innerHTML = `👤 ${usuarioActual.username} | $${usuarioActual.saldo.toLocaleString()}`;
        }
    }

    function recargarSaldo() {
        if (!usuarioActual) return;
        usuarioActual.saldo += 50000;
        guardarUsuarios();
        actualizarUI();
        alert(`💰 Nuevo saldo: $${usuarioActual.saldo.toLocaleString()}`);
    }

    function agregarHistorial(evento, tipo, monto, resultado) {
        if (!usuarioActual) return;
        usuarioActual.historial.unshift({
            fecha: new Date().toLocaleString(),
            tipo, evento, monto, resultado
        });
        guardarUsuarios();
        renderizarHistorial();
    }

    function apostar(local, visitante, tipo, cuota) {
        if (!usuarioActual) { alert("Inicia sesión"); return; }
        let monto = parseInt(prompt(`Apostar en ${local} vs ${visitante}\nCuota: ${cuota}\nMonto:`));
        if (isNaN(monto) || monto <= 0) { alert("Monto inválido"); return; }
        if (monto > usuarioActual.saldo) { alert("Saldo insuficiente"); return; }

        usuarioActual.saldo -= monto;
        let random = Math.random();
        let resultado = random < 0.4 ? "local" : (random < 0.7 ? "empate" : "visitante");
        let ganado = (tipo === resultado);
        let ganancia = 0;

        if (ganado) {
            ganancia = Math.floor(monto * cuota);
            usuarioActual.saldo += ganancia;
            alert(`🎉 GANASTE! $${ganancia.toLocaleString()}`);
            agregarHistorial(`${local} vs ${visitante} (${tipo})`, "⚽ Deportiva", monto, `GANÓ +$${ganancia}`);
        } else {
            alert(`😞 PERDISTE $${monto.toLocaleString()}`);
            agregarHistorial(`${local} vs ${visitante} (${tipo})`, "⚽ Deportiva", monto, `PERDIÓ -$${monto}`);
        }
        guardarUsuarios();
        actualizarUI();
    }

    function renderizarSidebar() {
        let html = '';
        ligas.forEach(l => {
            html += `<li onclick="cargarPartidos('${l.nombre}')">${l.nombre}<span class="menu-count">${l.count}</span></li>`;
        });
        document.getElementById('ligasList').innerHTML = html;
    }

    window.cargarPartidos = function(liga) {
        let container = document.getElementById('partidosList');
        let lista = partidos[liga] || [];
        if (lista.length === 0) {
            container.innerHTML = '<p>No hay partidos</p>';
            return;
        }
        let html = `<h3>🏆 ${liga}</h3>`;
        lista.forEach(p => {
            html += `
                <div class="partido-card">
                    <div class="equipos">${p.local} vs ${p.visitante}</div>
                    <div class="cuotas">
                        <div class="cuota" onclick="apostar('${p.local}','${p.visitante}','local',${p.cuotaL})">${p.local}<br><small>${p.cuotaL}</small></div>
                        <div class="cuota" onclick="apostar('${p.local}','${p.visitante}','empate',${p.cuotaE})">Empate<br><small>${p.cuotaE}</small></div>
                        <div class="cuota" onclick="apostar('${p.local}','${p.visitante}','visitante',${p.cuotaV})">${p.visitante}<br><small>${p.cuotaV}</small></div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    };

    function renderizarLoterias() {
        let container = document.getElementById('loteriasList');
        let loterias = [
            { id: "mega", nombre: "MEGA", texto: "Gana hasta 500 millones" },
            { id: "super", nombre: "SUPER", texto: "Gana hasta $50 millones" },
            { id: "extra", nombre: "EXTRA", texto: "Gana hasta $1 millón" }
        ];
        let html = '';
        loterias.forEach(l => {
            html += `
                <div class="loteria-card">
                    <h3>🎰 ${l.nombre}</h3>
                    <p>${l.texto}</p>
                    <input type="number" id="num_${l.id}" placeholder="Número 1-100">
                    <input type="number" id="monto_${l.id}" placeholder="Monto">
                    <button class="btn-login" onclick="jugarLoteria('${l.id}')">Apostar</button>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    window.jugarLoteria = function(id) {
        if (!usuarioActual) { alert("Inicia sesión"); return; }
        let numero = parseInt(document.getElementById(`num_${id}`).value);
        let monto = parseInt(document.getElementById(`monto_${id}`).value);
        if (isNaN(numero) || numero < 1 || numero > 100) { alert("Número 1-100"); return; }
        if (isNaN(monto) || monto <= 0) { alert("Monto inválido"); return; }
        if (monto > usuarioActual.saldo) { alert("Saldo insuficiente"); return; }

        usuarioActual.saldo -= monto;
        let ganador = Math.floor(Math.random() * 100) + 1;
        let ganancia = 0;
        if (numero === ganador) {
            ganancia = monto * (Math.random() * 20 + 5);
            ganancia = Math.floor(ganancia);
            usuarioActual.saldo += ganancia;
            alert(`🎉 GANASTE! Número: ${ganador}. Premio: $${ganancia}`);
            agregarHistorial(`${id.toUpperCase()} - N° ${numero}`, "🎰 Lotería", monto, `GANÓ +$${ganancia}`);
        } else {
            alert(`😞 Perdiste. Número ganador: ${ganador}`);
            agregarHistorial(`${id.toUpperCase()} - N° ${numero}`, "🎰 Lotería", monto, `PERDIÓ -$${monto}`);
        }
        guardarUsuarios();
        actualizarUI();
    };

    function renderizarHistorial() {
        let container = document.getElementById('historialList');
        if (!usuarioActual || !usuarioActual.historial.length) {
            container.innerHTML = '<div class="historial-item">No hay apuestas aún</div>';
            return;
        }
        let html = '';
        usuarioActual.historial.forEach(h => {
            html += `<div class="historial-item"><strong>${h.fecha}</strong> | ${h.tipo} | ${h.evento} | $${h.monto} | ${h.resultado}</div>`;
        });
        container.innerHTML = html;
    }

    function setupTabs() {
        let btns = document.querySelectorAll('.tab-btn');
        btns.forEach(btn => {
            btn.onclick = () => {
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                let tab = btn.dataset.tab;
                document.getElementById('deportesPanel').classList.toggle('hidden', tab !== 'deportes');
                document.getElementById('loteriasPanel').classList.toggle('hidden', tab !== 'loterias');
                document.getElementById('historialPanel').classList.toggle('hidden', tab !== 'historial');
                if (tab === 'loterias') renderizarLoterias();
                if (tab === 'historial') renderizarHistorial();
            };
        });
    }

    function mostrarLogin() {
        let loginForm = document.getElementById('loginForm');
        let userPanel = document.getElementById('userPanel');
        let mainApp = document.getElementById('mainApp');
        if (usuarioActual) {
            loginForm.classList.add('hidden');
            userPanel.classList.remove('hidden');
            mainApp.classList.remove('hidden');
            actualizarUI();
            renderizarSidebar();
            setupTabs();
            cargarPartidos('Premier League');
        } else {
            loginForm.classList.remove('hidden');
            userPanel.classList.add('hidden');
            mainApp.classList.add('hidden');
        }
    }

    // Inicializar
    cargarUsuarios();
    document.getElementById('btnLogin').onclick = () => {
        let user = document.getElementById('username').value.trim();
        let pass = document.getElementById('password').value;
        if (!user) { alert("Ingresa usuario"); return; }
        login(user, pass);
        mostrarLogin();
    };
    document.getElementById('btnLogout').onclick = () => {
        usuarioActual = null;
        mostrarLogin();
    };
    document.getElementById('btnRecarga').onclick = () => recargarSaldo();
    mostrarLogin();
</script>
</body>
</html>
